name: Update Dashboard Data

on:
  schedule:
    # Hourly 10am–3pm AEST (00:00–05:00 UTC), NHL season only (Oct–Apr)
    - cron: "0 0,1,2,3,4,5 * 1-4,10-12 *"
    # Daily catch-up at 06:00 UTC (4pm AEST) for any final scores
    - cron: "0 6 * 1-4,10-12 *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write    # needed to commit data.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Yahoo data and build data.json
        env:
          YAHOO_CLIENT_ID:     ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_LEAGUE_KEY:    ${{ secrets.YAHOO_LEAGUE_KEY }}
          TOTAL_TEAMS:         ${{ secrets.TOTAL_TEAMS }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python scripts/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "PWW Bot"
          git config user.email "pww-bot@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

